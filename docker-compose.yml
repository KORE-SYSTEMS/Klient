services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klient-app
    restart: unless-stopped
    ports:
      - "3200:3000"
    environment:
      DATABASE_URL: postgresql://klient:${DB_PASSWORD}@klient-db:5432/klient
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@klient.local}
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - klient-net

  db:
    image: postgres:15-alpine
    container_name: klient-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: klient
      POSTGRES_USER: klient
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klient"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - klient-net

volumes:
  postgres_data:

networks:
  klient-net:
    driver: bridge
